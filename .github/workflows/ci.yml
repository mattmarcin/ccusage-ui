name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: TypeScript check
        run: bun run check

      - name: Frontend build
        run: bun run build

      - name: Rust fmt
        working-directory: src-tauri
        run: cargo fmt -- --check

      - name: Rust tests
        working-directory: src-tauri
        run: cargo test